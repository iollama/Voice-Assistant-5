; --- Tell PIO to use the existing Arduino layout instead of ./src ---
; The repo already has voice_agent_5/ with .ino files and a vendored
; ArduinoWebsockets in voice_agent_5/src/. Pointing src_dir at that
; folder keeps the existing #include "src/ArduinoWebsockets.h" working.
; NOTE: these MUST live in [platformio], not [env:*] — PIO silently
; ignores them in the env section and falls back to ./src.
[platformio]
src_dir = voice_agent_5
data_dir = voice_agent_5/data

[env:esp32s3-n16r8]
; pioarduino fork — packages Arduino-ESP32 core 3.x. The default
; `platform = espressif32` is stuck on core 2.x and is missing
; esp32-hal-periman.h, which Arduino_GFX_Library 1.6.5 needs.
; 55.03.38-1 == Arduino-ESP32 3.3.8, matching toolchain.md.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- N16R8 board settings (16 MB flash, 8 MB OPI PSRAM) ---
board_build.arduino.memory_type = qio_opi   ; enables OPI PSRAM
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = voice_agent_5/partitions.csv

; --- Match the FQBN flags from sketch.yaml ---
build_flags =
    -DBOARD_HAS_PSRAM
    ; ARDUINO_USB_MODE is intentionally omitted — the board json supplies =1 (HWCDC).
    ; Defining it here causes a redefinition warning and was incorrectly set to 0 (TinyUSB).
    -DARDUINO_USB_CDC_ON_BOOT=1    ; CDCOnBoot=cdc
    -DARDUINO_RUNNING_CORE=1       ; LoopCore=1
    -DARDUINO_EVENT_RUNNING_CORE=1 ; EventsCore=1

; --- Same library versions as toolchain.md ---
lib_deps =
    bblanchon/ArduinoJson @ ^7.4.3
    adafruit/Adafruit NeoPixel @ ^1.15.4
    moononournation/GFX Library for Arduino @ ^1.6.5
    ricmoo/QRCode @ ^0.0.1

; --- Upload / monitor ---
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder